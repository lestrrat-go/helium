name: Fuzz
on:
  push:
    branches: [main] # short fuzz on every push to main (in practice, each PR merge); non-gating, PRs run no fuzz
  schedule:
    - cron: '0 3 * * 3' # Weekly deep fuzz on Wednesday at 03:00 UTC
  workflow_dispatch:
    inputs:
      fuzz-time:
        description: 'Duration per fuzz target (e.g. 5m, 10m)'
        required: false
        default: '5m'

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['.', 'c14n', 'catalog', 'html', 'relaxng', 'schematron', 'sink', 'stream', 'xinclude', 'xpath1', 'xpath3', 'xpointer', 'xsd', 'xslt3']
    name: "Fuzz ${{ matrix.package }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Restore fuzz cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-${{ hashFiles('go.mod') }}-${{ matrix.package }}-${{ github.ref }}
          restore-keys: |
            fuzz-${{ hashFiles('go.mod') }}-${{ matrix.package }}-
      - name: Run fuzz tests
        run: |
          set -o pipefail
          # Merge (push) runs get a short budget for a prompt post-merge signal;
          # the weekly schedule runs deep; manual dispatch uses its input.
          FUZZTIME="${{ github.event.inputs.fuzz-time || (github.event_name == 'push' && '60s') || '5m' }}"
          mkdir -p /tmp/fuzz-output
          for target in $(go test ./${{ matrix.package }}/ -list '^Fuzz' -run '^$' | grep '^Fuzz' || true); do
            echo "::group::${target}"
            go test ./${{ matrix.package }}/ -run '^$' -fuzz "^${target}\$" -fuzztime "${FUZZTIME}" 2>&1 \
              | tee -a /tmp/fuzz-output/log.txt
            echo "::endgroup::"
          done

      - name: Collect failing corpus
        if: failure()
        run: |
          mkdir -p /tmp/fuzz-failures
          grep -oP 'Failing input written to \K\S+' /tmp/fuzz-output/log.txt \
            | while read -r f; do
                pkg="${{ matrix.package }}"
                path="${f}"
                if [ "$pkg" != "." ]; then
                  path="${pkg}/${f}"
                fi
                if [ -f "$path" ]; then
                  cp --parents "$path" /tmp/fuzz-failures/
                fi
              done

      - name: Upload failing corpus
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.package }}
          path: /tmp/fuzz-failures/
          if-no-files-found: ignore
          retention-days: 30
