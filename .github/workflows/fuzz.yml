name: Fuzz
on:
  schedule:
    - cron: '0 3 * * 3' # Weekly on Wednesday at 03:00 UTC
  workflow_dispatch:
    inputs:
      fuzz-time:
        description: 'Duration per fuzz target (e.g. 5m, 10m)'
        required: false
        default: '5m'

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['.', 'c14n', 'catalog', 'html', 'relaxng', 'schematron', 'sink', 'stream', 'xinclude', 'xpath1', 'xpath3', 'xpointer', 'xsd', 'xslt3']
    name: "Fuzz ${{ matrix.package }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Restore fuzz cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-${{ hashFiles('go.mod') }}-${{ matrix.package }}-${{ github.ref }}
          restore-keys: |
            fuzz-${{ hashFiles('go.mod') }}-${{ matrix.package }}-
      - name: Run fuzz tests
        run: |
          FUZZTIME="${{ github.event.inputs.fuzz-time || '5m' }}"
          for target in $(go test ./${{ matrix.package }}/ -list '^Fuzz' -run '^$' | grep '^Fuzz' || true); do
            echo "::group::${target}"
            go test ./${{ matrix.package }}/ -run '^$' -fuzz "^${target}\$" -fuzztime "${FUZZTIME}"
            echo "::endgroup::"
          done
