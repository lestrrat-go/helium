name: Fuzz
on:
  schedule:
    - cron: '0 3 * * 3' # Weekly on Wednesday at 03:00 UTC
  workflow_dispatch:
    inputs:
      fuzz-time:
        description: 'Duration per fuzz target (e.g. 5m, 10m)'
        required: false
        default: '5m'

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['.', 'c14n', 'catalog', 'html', 'relaxng', 'schematron', 'sink', 'stream', 'xinclude', 'xpath1', 'xpath3', 'xpointer', 'xsd', 'xslt3']
    name: "Fuzz ${{ matrix.package }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Restore fuzz cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-${{ hashFiles('go.mod') }}-${{ matrix.package }}-${{ github.ref }}
          restore-keys: |
            fuzz-${{ hashFiles('go.mod') }}-${{ matrix.package }}-
      - name: Run fuzz tests
        run: |
          FUZZTIME="${{ github.event.inputs.fuzz-time || '5m' }}"
          mkdir -p /tmp/fuzz-output
          for target in $(go test ./${{ matrix.package }}/ -list '^Fuzz' -run '^$' | grep '^Fuzz' || true); do
            echo "::group::${target}"
            go test ./${{ matrix.package }}/ -run '^$' -fuzz "^${target}\$" -fuzztime "${FUZZTIME}" 2>&1 \
              | tee -a /tmp/fuzz-output/log.txt
            echo "::endgroup::"
          done

      - name: Collect failing corpus
        if: failure()
        run: |
          mkdir -p /tmp/fuzz-failures
          grep -oP 'Failing input written to \K\S+' /tmp/fuzz-output/log.txt \
            | while read -r f; do
                pkg="${{ matrix.package }}"
                path="${f}"
                if [ "$pkg" != "." ]; then
                  path="${pkg}/${f}"
                fi
                if [ -f "$path" ]; then
                  cp --parents "$path" /tmp/fuzz-failures/
                fi
              done

      - name: Upload failing corpus
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.package }}
          path: /tmp/fuzz-failures/
          if-no-files-found: ignore
          retention-days: 30
