name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Tier 1: lint runs first. Every heavier tier below gates on it via needs,
  # so a lint failure short-circuits the whole pipeline before any tests or
  # fuzzing run.
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Run go vet
        run: go vet ./...

  # Tier 2: main tests, only after lint succeeds.
  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # The race detector is OS-agnostic for the data races it finds, but it
        # multiplies test runtime; on the slower Windows/macOS runners the heavy
        # W3C suites (xslt3/xpath3) intermittently blow the 20m timeout under
        # -race. Run -race on Linux only; the other OSes run the same tests
        # without it (kept purely for cross-platform behavior coverage).
        include:
          - os: ubuntu-latest
            race: "-race"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ${{ matrix.race }} -timeout 20m ./...

  verify:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # Module caching is handled explicitly above so the cache path stays stable.
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Install stringer
        run: go install golang.org/x/tools/cmd/stringer@v0.46.0

      - name: Check generated parser state file
        run: |
          "$(go env GOPATH)/bin/stringer" -type=parserState -output parser_state_gen.go
          git diff --exit-code parser_state_gen.go

      - name: Tidy dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build helium command
        run: |
          go build ./cmd/helium
          rm helium

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes detected:"
            git status --porcelain
            exit 1
          fi

  govulncheck:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.4.0 ./...
