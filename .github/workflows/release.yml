name: Release

# Dispatch-driven release. Instead of triggering on a pushed tag (which would
# leave a public tag behind if the conformance gate then failed), a release is
# started manually with a version input. The slow XSLT 3.0 conformance suite
# runs FIRST; only when it is green does the release job create the tag and run
# goreleaser. A red gate stops the run before any tag exists, so a failing
# conformance test has zero side effects.
#
# The release job is bound to the `release` GitHub Environment, which requires
# maintainer approval and is restricted to the `main` branch — so the tag/publish
# step pauses for a human even though anyone with write access can dispatch.
#
# See RELEASING.md for the full runbook (how to dispatch, how to bump the pinned
# harness_ref, and recovery if goreleaser fails after tagging).
on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag to create (e.g. v0.5.2)
        type: string
        required: true
      harness_ref:
        # Pinned to a known-good helium-w3c-tests commit so the release gate is
        # reproducible and cannot be red-blocked by unrelated harness@main churn.
        # Bump this to the harness SHA from the latest green nightly conformance
        # run when certifying a release against newer upstream tests.
        # See RELEASING.md.
        description: helium-w3c-tests (harness) commit/tag to gate against
        type: string
        default: b0a79c5b459dd74d0daef6142513f3cab2b5243b

permissions:
  contents: read

jobs:
  # Fast presence check: the release-to-be must already have a row in the
  # committed cross-release conformance timeline (tools/conformance-timeline).
  # This runs FIRST, before the slow suite, so a forgotten timeline row fails the
  # release in seconds rather than after the multi-minute gate. It exists because
  # v0.6.0 was released without a timeline row (the tag was cut after the last
  # regeneration); this gate prevents that recurring.
  timeline-presence:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Require a conformance-timeline row for this version
        env:
          VERSION: ${{ inputs.version }}
          SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json, os, sys
          version, sha = os.environ["VERSION"], os.environ["SHA"]
          data = json.load(open("tools/conformance-timeline/data.json"))
          if version in data.get("tags", []):
              print(f"conformance-timeline has a row for {version}")
              sys.exit(0)
          sys.exit(
              f"::error::No conformance-timeline row for {version}.\n"
              f"Measure the release candidate and commit the regenerated timeline docs "
              f"before dispatching the release:\n"
              f"  tools/conformance-timeline/run.sh --ref {sha} --as {version}\n"
              f"  git add tools/conformance-timeline/data.json "
              f"tools/conformance-timeline/conformance-timeline.svg "
              f"tools/conformance-timeline/conformance-timeline.html CONFORMANCE.md\n"
              f"  git commit && push, then re-dispatch the release."
          )
          PY

  # Release-gating conformance run: the full slow XSLT 3.0 suite must pass with
  # zero failures before anything is tagged or published. The release job needs:
  # this, so a red slow run blocks the release BEFORE a tag is ever created.
  conformance-gate:
    needs: timeline-presence
    permissions:
      contents: read
    uses: ./.github/workflows/conformance-run.yml
    with:
      suite: xslt30
      slow: true
      harness_ref: ${{ inputs.harness_ref }}

  release:
    needs: conformance-gate
    runs-on: ubuntu-latest
    # Maintainer-approval gate: a dispatch may be started by anyone with write
    # access, but the `release` environment requires a reviewer and is pinned to
    # the main branch, so tag + publish only proceeds after human approval.
    environment: release
    permissions:
      # Needed to push the tag and to let goreleaser publish the GitHub release.
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      # goreleaser derives the release version from a git tag, so the tag is
      # created here (after the gate is green) and pushed with GITHUB_TOKEN. The
      # push is a plain git operation — it deliberately does NOT trigger any
      # other workflow; goreleaser runs inline via the next step.
      - name: Create and push release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Accept only a canonical SemVer vX.Y.Z with an optional pre-release:
          # numeric identifiers carry no leading zeros (so v01.02.03 and a numeric
          # pre-release like v1.2.3-01 are rejected), pre-release identifiers are
          # dot-separated alphanumerics/hyphens, and no path characters like '/'.
          # A second git check-ref-format guard rejects anything else Git would
          # consider a malformed ref.
          if ! printf '%s' "$VERSION" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*)?$'; then
            echo "version input '$VERSION' is not a canonical vX.Y.Z[-prerelease] tag" >&2
            exit 1
          fi
          if ! git check-ref-format "refs/tags/$VERSION"; then
            echo "version input '$VERSION' is not a valid git tag ref" >&2
            exit 1
          fi
          # Idempotent for a goreleaser-failure re-run: if the tag already exists
          # pointing at THIS commit, a prior run created it before goreleaser died
          # — reuse it and fall through to publish. Only fail when it exists on a
          # different commit (a genuine collision). See RELEASING.md recovery.
          target=$(git rev-parse HEAD)
          if existing=$(git rev-parse -q --verify "refs/tags/$VERSION^{commit}"); then
            if [ "$existing" != "$target" ]; then
              echo "tag $VERSION already exists at $existing, not HEAD ($target)" >&2
              exit 1
            fi
            echo "tag $VERSION already exists at HEAD — reusing it (goreleaser re-run)"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "$VERSION"
            git push origin "refs/tags/$VERSION"
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "v2.16.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
