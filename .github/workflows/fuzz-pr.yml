name: Fuzz PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ['.', 'c14n', 'catalog', 'html', 'relaxng', 'schematron', 'sink', 'stream', 'xinclude', 'xpath1', 'xpath3', 'xpointer', 'xsd', 'xslt3']
    name: "Fuzz smoke ${{ matrix.package }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Run fuzz smoke tests
        run: |
          FUZZTIME="5s"
          mkdir -p /tmp/fuzz-output
          for target in $(go test ./${{ matrix.package }}/ -list '^Fuzz' -run '^$' | grep '^Fuzz' || true); do
            echo "::group::${target}"
            go test ./${{ matrix.package }}/ -run '^$' -fuzz "^${target}\$" -fuzztime "${FUZZTIME}" 2>&1 \
              | tee -a /tmp/fuzz-output/log.txt
            echo "::endgroup::"
          done

      - name: Collect failing corpus
        if: failure()
        run: |
          mkdir -p /tmp/fuzz-failures
          grep -oP 'Failing input written to \K\S+' /tmp/fuzz-output/log.txt \
            | while read -r f; do
                pkg="${{ matrix.package }}"
                path="${f}"
                if [ "$pkg" != "." ]; then
                  path="${pkg}/${f}"
                fi
                if [ -f "$path" ]; then
                  cp --parents "$path" /tmp/fuzz-failures/
                fi
              done

      - name: Upload failing corpus
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-corpus-${{ matrix.package }}
          path: /tmp/fuzz-failures/
          if-no-files-found: ignore
          retention-days: 30
