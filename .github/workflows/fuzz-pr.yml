name: Fuzz PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: '.'
            target: FuzzParse
          - package: c14n
            target: FuzzCanonicalize
          - package: catalog
            target: FuzzLoad
          - package: html
            target: FuzzParse
          - package: relaxng
            target: FuzzValidate
          - package: schematron
            target: FuzzValidate
          - package: sink
            target: FuzzSink
          - package: stream
            target: FuzzWriter
          - package: xinclude
            target: FuzzProcess
          - package: xpath1
            target: FuzzCompile
          - package: xpath3
            target: FuzzCompile
          - package: xpointer
            target: FuzzEvaluate
          - package: xsd
            target: FuzzValidate
          - package: xslt3
            target: FuzzTransform
    name: "Fuzz smoke ${{ matrix.package }} ${{ matrix.target }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Run fuzz smoke tests
        run: |
          set -o pipefail
          FUZZTIME="5s"
          mkdir -p /tmp/fuzz-output
          go test ./${{ matrix.package }}/ -run '^$' -fuzz "^${{ matrix.target }}\$" -fuzztime "${FUZZTIME}" 2>&1 \
            | tee -a /tmp/fuzz-output/log.txt

      - name: Collect failing corpus
        if: failure()
        run: |
          mkdir -p /tmp/fuzz-failures
          grep -oP 'Failing input written to \K\S+' /tmp/fuzz-output/log.txt \
            | while read -r f; do
                pkg="${{ matrix.package }}"
                path="${f}"
                if [ "$pkg" != "." ]; then
                  path="${pkg}/${f}"
                fi
                if [ -f "$path" ]; then
                  cp --parents "$path" /tmp/fuzz-failures/
                fi
              done

      - name: Upload failing corpus
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.package }}
          path: /tmp/fuzz-failures/
          if-no-files-found: ignore
          retention-days: 30
